<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parasite AI Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: #333; }
        .container { text-align: center; width: 100%; max-width: 640px; padding: 20px; }
        h2 { font-weight: 300; letter-spacing: 1px; margin-bottom: 30px; color: #2c3e50; }
        .camera-box { position: relative; width: 100%; aspect-ratio: 4 / 3; background: #f1f3f5; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        video { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 2; }
        .controls { margin-top: 30px; }
        button { background-color: #3498db; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
        button:hover { background-color: #2980b9; transform: translateY(-2px); }
        .status { margin-top: 20px; font-size: 14px; color: #7f8c8d; background: #f8f9fa; padding: 10px 20px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>PARASITE AI</h2>
    <div class="camera-box">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="detection-canvas"></canvas>
    </div>
    <div class="controls">
        <button id="start-btn">Start Detection</button>
    </div>
    <div class="status" id="status-text">กำลังโหลดระบบ...</div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('detection-canvas');
    const ctx = canvas.getContext('2d');
    const button = document.getElementById('start-btn');
    const statusText = document.getElementById('status-text');
    let model;

    // --- 1. โหลดโมเดล (แก้ Path เป็นหน้าแรกเรียบร้อย) ---
    async function loadModel() {
        try {
            statusText.innerText = "สถานะ: กำลังโหลดโมเดล...";
            // แก้เป็น ./model.json เพื่อหาไฟล์ที่หน้าแรก
            model = await tf.loadGraphModel('./model.json'); 
            statusText.innerText = "สถานะ: โมเดลพร้อม! กด Start ได้เลย";
            button.disabled = false;
        } catch (e) {
            statusText.innerText = "สถานะ: โหลดไม่สำเร็จ (เช็คไฟล์บน GitHub): " + e.message;
        }
    }

    button.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 640, height: 640 },
                audio: false
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                button.disabled = true;
                runDetection();
            };
        } catch (err) {
            alert("กล้องไม่ทำงาน: " + err.message);
        }
    });

    // --- 2. ฟังก์ชันตรวจจับและวาดกรอบสีฟ้า ---
    async function runDetection() {
        if (!model) return;

        const tfImg = tf.browser.fromPixels(video);
        const resized = tf.image.resizeBilinear(tfImg, [640, 640]);
        const input = resized.div(255.0).expandDims(0);

        const predictions = await model.predict(input);
        const res = await predictions.array();
        const data = res[0]; 

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // วนลูปเช็คค่าพิกัด (Post-processing สำหรับ YOLOv8)
        for (let i = 0; i < 8400; i++) {
            let maxProb = 0;
            for (let j = 4; j < data.length; j++) {
                if (data[j][i] > maxProb) maxProb = data[j][i];
            }

            if (maxProb > 0.5) { // ถ้าความแม่นยำ > 50%
                const x_c = data[0][i] * (canvas.width / 640);
                const y_c = data[1][i] * (canvas.height / 640);
                const w = data[2][i] * (canvas.width / 640);
                const h = data[3][i] * (canvas.height / 640);

                ctx.strokeStyle = '#3498db'; // สีฟ้า
                ctx.lineWidth = 3;
                ctx.strokeRect(x_c - w/2, y_c - h/2, w, h);
                statusText.innerText = "สถานะ: !!! พบพยาธิ !!!";
            }
        }

        tf.dispose([tfImg, resized, input, predictions]);
        requestAnimationFrame(runDetection);
    }

    loadModel();
</script>
</body>
</html>
