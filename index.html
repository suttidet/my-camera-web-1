<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parasite AI Expert - Parasite Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; width: 100%; max-width: 640px; padding: 20px; }
        h2 { font-weight: 300; color: #2c3e50; margin-bottom: 20px; letter-spacing: 1px; }
        .camera-box { position: relative; width: 100%; aspect-ratio: 4 / 3; background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid #f1f3f5; }
        video { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 2; }
        .controls { margin-top: 25px; }
        button { background-color: #3498db; color: white; border: none; padding: 16px 50px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
        button:hover { background-color: #2980b9; transform: translateY(-2px); }
        button:disabled { background-color: #bdc3c7; box-shadow: none; }
        .status-badge { margin-top: 15px; padding: 10px 25px; border-radius: 12px; font-size: 14px; background: #f8f9fa; color: #7f8c8d; display: inline-block; border: 1px solid #eee; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h2>PARASITE AI DETECTOR</h2>
    <div class="camera-box">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="detection-canvas"></canvas>
    </div>
    <div class="controls">
        <button id="start-btn" disabled>กำลังโหลดโมเดล...</button>
    </div>
    <div id="status-text" class="status-badge">ระบบกำลังเริ่มต้น...</div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('detection-canvas');
    const ctx = canvas.getContext('2d');
    const button = document.getElementById('start-btn');
    const statusText = document.getElementById('status-text');
    
    // --- 1. ใส่ชื่อพยาธิตามที่คุณแจ้งมา ---
    const LABELS = ['Giardia Lamblia', 'Opisthorchis-viverrine']; 
    let model;

    async function init() {
        try {
            // โหลดโมเดลจากหน้าแรก (Path: ./model.json)
            model = await tf.loadGraphModel('./model.json');
            statusText.innerText = "สถานะ: โมเดลพร้อมใช้งาน";
            button.innerText = "เริ่มส่องพยาธิ";
            button.disabled = false;
        } catch (e) {
            statusText.innerText = "Error: โหลดโมเดลไม่สำเร็จ เช็คไฟล์บน GitHub";
            console.error(e);
        }
    }

    button.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 640 } },
                audio: false
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                button.style.display = "none";
                runDetection();
            };
        } catch (err) {
            alert("เข้าถึงกล้องไม่ได้: " + err.message);
        }
    });

    async function runDetection() {
        if (!model) return;

        // ขั้นตอนการเตรียมภาพ
        const tfImg = tf.browser.fromPixels(video);
        const resized = tf.image.resizeBilinear(tfImg, [640, 640]);
        const input = resized.div(255.0).expandDims(0);

        const predictions = await model.predict(input);
        const res = await predictions.array();
        const data = res[0]; // ข้อมูลจาก YOLOv8 [84, 8400]

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let found = false;
        // วนลูปเช็ค 8400 ตำแหน่งที่ AI คาดการณ์
        for (let i = 0; i < 8400; i++) {
            let maxProb = 0;
            let classIdx = -1;
            
            // ตรวจสอบความมั่นใจของแต่ละ Class (Giardia = index 4, Opisthorchis = index 5)
            for (let j = 4; j < data.length; j++) {
                if (data[j][i] > maxProb) {
                    maxProb = data[j][i];
                    classIdx = j - 4;
                }
            }

            // --- ปรับค่าความมั่นใจ (Threshold) เป็น 80% เพื่อลดการจับมั่ว ---
            if (maxProb > 0.80) { 
                found = true;
                const x_c = data[0][i] * (canvas.width / 640);
                const y_c = data[1][i] * (canvas.height / 640);
                const w = data[2][i] * (canvas.width / 640);
                const h = data[3][i] * (canvas.height / 640);

                const x = x_c - w/2;
                const y = y_c - h/2;

                // วาดกรอบสีฟ้า (Neon Blue)
                ctx.strokeStyle = '#00d2ff';
                ctx.lineWidth = 5;
                ctx.strokeRect(x, y, w, h);

                // วาดป้ายชื่อพยาธิ
                ctx.fillStyle = '#00d2ff';
                ctx.fillRect(x, y - 30, w > 150 ? w : 180, 30);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(`${LABELS[classIdx]} ${Math.round(maxProb*100)}%`, x + 10, y - 8);
            }
        }

        if (found) {
            statusText.innerText = "!!! ตรวจพบพยาธิในตัวอย่าง !!!";
            statusText.style.background = "#fff0f0";
            statusText.style.color = "#e74c3c";
            statusText.style.borderColor = "#e74c3c";
        } else {
            statusText.innerText = "สถานะ: กำลังสแกนหาพยาธิ...";
            statusText.style.background = "#f8f9fa";
            statusText.style.color = "#7f8c8d";
            statusText.style.borderColor = "#eee";
        }

        tf.dispose([tfImg, resized, input, predictions]);
        requestAnimationFrame(runDetection);
    }

    init();
</script>
</body>
</html>
