<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('detection-canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status-text');
    let model;

    // 1. โหลดโมเดล AI
    async function loadModel() {
        try {
            statusText.innerText = "กำลังโหลดโมเดล AI...";
            // ชี้ไปที่โฟลเดอร์ model ที่เราสร้างไว้
            model = await tf.loadGraphModel('./model/model.json');
            statusText.innerText = "โมเดลพร้อม! กด Start เพื่อเริ่มตรวจจับ";
        } catch (e) {
            statusText.innerText = "โหลดโมเดลไม่สำเร็จ: " + e.message;
        }
    }

    // 2. ฟังก์ชันตรวจจับ (Inference)
    async function detect() {
        if (model && video.readyState === 4) {
            const predictions = await model.executeAsync(tf.browser.fromPixels(video).expandDims(0));
            
            // ล้างหน้าจอ Canvas ก่อนวาดใหม่
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // หมายเหตุ: ตรงนี้ต้องเขียน Logic การดึงค่าพิกัดพยาธิจากโมเดล YOLO 
            // ซึ่งแต่ละโมเดลจะมี Output Format ต่างกันเล็กน้อย
            // หากคุณรันแล้วกรอบไม่ขึ้น บอกผมนะครับ เราจะมาจูนค่าพิกัดกัน
        }
        requestAnimationFrame(detect);
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            detect();
        };
    });

    loadModel();
</script>
